model:
  name: GptOssModel
  params:
    model_name: "openai/gpt-oss-20b"
    device: "auto"
    cache_dir: "/mnt/nlp/models"
prompt:
  name: GptOssPrompt
  params:
    reasoning_effort: "high"
    system_message: |
      You are ChatGPT, a large language model trained by OpenAI.
      Knowledge cutoff: 2024-06
      Current date: 2025-08-28
      Reasoning: high
      # Valid channels: analysis, commentary, final. Channel must be included for every message.
    developer_message: |
      # Instructions
      Follow the instructions strictly.

generation_config:
  name: default
  params:
    max_new_tokens: 16000
    temperature: 1.0
    top_p: 1.0
    do_sample: false

profiling_prompt: |
  You are an expert user experience researcher. Your task is to analyze the following user description and generate a structured JSON profile based on it.

  **User Description:**
  "{description}"

  Based on this description, create a JSON object that captures the user's persona, their needs regarding coding tasks, and their preferences for the output.

  Your output MUST be a single, valid JSON object. Use the following structure and explanations as a guide.

  **JSON Template:**
  ```json
  {{
    "persona_description": "A one-sentence summary of the user's identity and primary goal.",
    "input_dimensions": {{
      "task_complexity_gradient": List[float, float], # the range of task complexity the user is comfortable with between 0 and 1
      "real_world_context_embedding": string, # a label of the user's real-world context
      "persona_based_task_framing": string # a label of the user's persona and how they would frame a task
    }},
    "output_dimensions": {{
      "clarity_and_comprehensibility": int, # on a scale of 1 to 5, how clear and understandable is the user's output
      "efficiency": int, # on a scale of 1 to 5, how efficient is the user's output
      "expressive_style": string # a label of the user's expressive style
    }}
  }}
  ```

  Generate the JSON object now.

evaluation_prompts:
  judge_prompt: |
    You are an expert in evaluating programming code.
    You will be given a programming task and a model's output.
    Your task is to determine if the model's output is correct.


    Programming Task:
    ---
    {programming_task}
    ---

    Model's Output:
    ---
    {model_output}
    ---

    Instructions:
    1. Read the programming task and the model's output carefully.
    2. Determine if the model's output is correct.
    3. If the model's output is correct, output "correct".
    4. If the model's output is incorrect, output "incorrect".
    5. No extra keys, no trailing commas, no markdown fences, no commentary.

    Make sure to output only the string "correct" or "incorrect" and nothing else.
  answer_similarity_judge_prompt_output: |
    You are an expert in evaluating the similarity of two model code outputs.
    You will be given a task and two model code outputs.
    Your task is to determine how similar the two code outputs are.

    Task:
    ---
    {task}
    ---

    Model Code Output 1:
    ---
    {model_code_output_1}
    ---

    Model Code Output 2:
    ---
    {model_code_output_2}
    ---

    Instructions:
    1. Read the task and the two model code outputs carefully.
    2. Determine how similar the two code outputs are.
    3. If the two code outputs are similar, output "similar".
    4. If the two code outputs are not similar, output "not similar".
    5. No extra keys, no trailing commas, no markdown fences, no commentary.

    Make sure to output only the string "similar" or "not similar" and nothing else.

personalization_prompts:
  identify_changes: |
    You are an expert in personalizing programming tasks.

    Task:
    Given the following user profile, identify 2–3 concrete, distinct ways to modify a programming problem prompt for each field of the profile.
    The modifications should adapt the prompt's phrasing, tone, and instructions to match the user's persona and preferences, without changing the core programming task.

    User Profile:
    ---
    {user_profile_json}
    ---

    Instructions:
    1. Output must be a single valid JSON object. Do not include any explanations, comments, or markdown code fences.
    2. The JSON must match exactly this structure:
      - Root object has one key: "changes_by_field".
      - "changes_by_field" is an array of objects.
      - Each object has:
        * "field": a string, the user profile field name.
        * "options": an array of objects.
      - Each option object has exactly four string keys:
        * "name" (snake_case identifier),
        * "change" (short description of modification),
        * "example" (a concrete snippet),
        * "rationale" (why it fits the profile field).
    3. Keys must be exactly: changes_by_field, field, options, name, change, example, rationale.
      - Never output {{field (wrong)}} — always output "field".
      - No extra keys, no trailing commas.

    Correct Example (with two fields and two options each):

    {{
      "changes_by_field": [
        {{
          "field": "persona_description",
          "options": [
            {{
              "name": "student_friendly_tone",
              "change": "Use a conversational, encouraging tone.",
              "example": "\\"Hey there! Let’s walk through this together.\\"",
              "rationale": "Matches the user’s beginner status."
            }},
            {{
              "name": "relatable_examples",
              "change": "Incorporate coursework-related examples.",
              "example": "\\"# Example: calculating the mean of exam scores.\\"",
              "rationale": "Connects with the user’s academic context."
            }}
          ]
        }},
        {{
          "field": "output_dimensions.clarity_and_comprehensibility",
          "options": [
            {{
              "name": "verbose_comments",
              "change": "Add comments explaining each line of code.",
              "example": "\\"# This line loads the dataset into memory.\\"",
              "rationale": "Ensures high clarity for a beginner."
            }},
            {{
              "name": "explanatory_prints",
              "change": "Add print statements describing steps.",
              "example": "\\"print('Calculating mean...')\\"",
              "rationale": "Provides real-time explanations during execution."
            }}
          ]
        }}
      ]
    }}

    Now, produce the JSON for all fields of the given user profile in exactly this format.

  compose_prompt: |
    You are an expert in rewriting programming tasks as a persona.
    You will be given an original programming problem prompt and a list of modifications to apply.
    Your task is to rewrite the prompt to incorporate all the specified changes while ensuring the underlying programming problem remains identical. Note that you are rewriting the prompt as the persona that requires the changes, so don't say it directly, but rather as if you are the persona.

    Original Prompt:
    ---
    {original_prompt}
    ---

    Modifications to apply:
    ---
    {changes_description}
    ---

    Instructions:
    1. Carefully read the original prompt and the list of changes.
    2. Rewrite the prompt to apply all changes cohesively.
    3. DO NOT alter the core requirements of the programming task. The new prompt must lead to the same solution.
    4. Ensure the output is a single, complete prompt.
    5. Your output MUST only contain the prompt text and nothing else.
      - No opening words or closing words
      - No explanations
      - No markdown fences

    Correct Example:

    You are a Python tutor.\\n\\nTask: Write a function sum_list(nums) that returns the sum of a list of integers.\\n\\nRequirements:\\n1) Input: a list of integers.\\n2) Output: an integer sum.\\n\\nInstructions:\\n- Use clear variable names and add brief inline comments.\\n- Provide a small example at the end showing input and output.
  verify_prompt: |
    You are an expert in verifying programming problem statements.
    You will be given an original prompt and a modified version of it.
    Your task is to determine if the modified prompt preserves the original's core task and would result in the same ground-truth solution. Note that the modified prompt should perserve the original's task intent, and not to provide a solution or hints to the task.

    Original Prompt:
    ---
    {original_prompt}
    ---

    Modified Prompt:
    ---
    {modified_prompt}
    ---

    Instructions:
    1. Read both prompts carefully.
    2. Decide:
      - "same_end_goal": Is the fundamental task identical in both prompts?
      - "same_ground_truth": Would the correct solution for the original also be correct for the modified?
    3. Output MUST be a single valid JSON object, nothing else.
    4. Use exactly these keys: same_end_goal, same_ground_truth, reason_if_failed.
      - Boolean values must be JSON booleans: true or false (lowercase).
      - If both booleans are true, set "reason_if_failed" to an empty string "".
      - If either boolean is false, provide a concise reason in "reason_if_failed".
    5. No extra keys, no trailing commas, no markdown fences, no commentary.

    Correct Examples:

    # Pass case (both true)
    {{
      "same_end_goal": true,
      "same_ground_truth": true,
      "reason_if_failed": ""
    }}

    # Fail case (ground truth differs)
    {{
      "same_end_goal": true,
      "same_ground_truth": false,
      "reason_if_failed": "Modified prompt changes input format, so the original correct solution would fail."
    }}
